name: Build XCFrameworks

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 3.1.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install cmake
        run: brew install cmake

      - name: Build all platforms
        run: sh build.sh all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          files: output/*.xcframework.zip
